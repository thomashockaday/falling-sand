<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Falling Sand</title>
  </head>
  <body>
    <header>
      <h1>Falling Sand</h1>
      <p>Click and drag around the canvas to watch the sand fall</p>
    </header>

    <canvas id="canvas"></canvas>

    <div class="controls">
      <button onclick="currentMaterial = SAND">Sand</button>
      <button onclick="currentMaterial = WATER">Water</button>
      <button onclick="currentMaterial = WOOD">Wood</button>
      <button onclick="currentMaterial = FIRE">Fire</button>
      <button onclick="currentMaterial = GAS">Gas</button>
      <button onclick="currentMaterial = ACID">Acid</button>
      <button onclick="currentMaterial = BLOCK">Block</button>
      <button onclick="currentMaterial = EMPTY">Erase</button>
    </div>
    <script src="main.js"></script>
  </body>
</html>
